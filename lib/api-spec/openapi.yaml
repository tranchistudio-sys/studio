  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      parameters:
        - name: bookingId
          in: query
          required: false
          schema:
            type: integer
        - name: rentalId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      parameters:
        - name: customerId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    put:
      operationId: updateQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotes/{id}/convert-to-booking:
    post:
      operationId: convertQuoteToBooking
      tags: [quotes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertQuoteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvertQuoteResponse"
        "409":
          description: Already converted
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  bookingId:
                    type: integer
                  convertedAt:
                    type: string
                    format: date-time

  /services:
    get:
      operationId: listServices
      tags: [services]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    put:
      operationId: updateService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounting/transactions:
    get:
      operationId: listTransactions
      tags: [accounting]
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [income, expense]
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [accounting]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /accounting/transactions/{id}:
    delete:
      operationId: deleteTransaction
      tags: [accounting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounting/summary:
    get:
      operationId: getAccountingSummary
      tags: [accounting]
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingSummary"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    put:
      operationId: updateStaff
      tags: [staff]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: deleteStaff
      tags: [staff]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        totalBookings:
          type: integer
        totalDebt:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, name, phone, createdAt, totalBookings, totalDebt]

    CreateCustomerRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name, phone]

    Booking:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        shootDate:
          type: string
          format: date
        shootTime:
          type: string
          nullable: true
        packageType:
          type: string
        status:
          type: string
          enum: [pending, confirmed, in_progress, completed, cancelled]
        totalAmount:
          type: number
        depositAmount:
          type: number
        remainingAmount:
          type: number
        notes:
          type: string
          nullable: true
        assignedStaffId:
          type: integer
          nullable: true
        assignedStaffName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, customerId, customerName, customerPhone, shootDate, packageType, status, totalAmount, depositAmount, remainingAmount, createdAt]

    CreateBookingRequest:
      type: object
      properties:
        customerId:
          type: integer
        shootDate:
          type: string
          format: date
        shootTime:
          type: string
          nullable: true
        packageType:
          type: string
        totalAmount:
          type: number
        depositAmount:
          type: number
        assignedStaffId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
      required: [customerId, shootDate, packageType, totalAmount, depositAmount]

    UpdateBookingRequest:
      type: object
      properties:
        shootDate:
          type: string
          format: date
        shootTime:
          type: string
          nullable: true
        packageType:
          type: string
        status:
          type: string
          enum: [pending, confirmed, in_progress, completed, cancelled]
        totalAmount:
          type: number
        depositAmount:
          type: number
        assignedStaffId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true

    Dress:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        color:
          type: string
        size:
          type: string
        style:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        rentalPrice:
          type: number
        depositRequired:
          type: number
        isAvailable:
          type: boolean
        condition:
          type: string
          enum: [excellent, good, fair, needs_repair]
        notes:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, code, name, color, size, rentalPrice, depositRequired, isAvailable, condition, createdAt]

    CreateDressRequest:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        color:
          type: string
        size:
          type: string
        style:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        rentalPrice:
          type: number
        depositRequired:
          type: number
        condition:
          type: string
          enum: [excellent, good, fair, needs_repair]
        notes:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required: [code, name, color, size, rentalPrice, depositRequired, condition]

    Rental:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        dressId:
          type: integer
        dressCode:
          type: string
        dressName:
          type: string
        rentalDate:
          type: string
          format: date
        returnDate:
          type: string
          format: date
        actualReturnDate:
          type: string
          format: date
          nullable: true
        rentalPrice:
          type: number
        depositPaid:
          type: number
        status:
          type: string
          enum: [rented, returned, overdue]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, customerId, customerName, customerPhone, dressId, dressCode, dressName, rentalDate, returnDate, rentalPrice, depositPaid, status, createdAt]

    CreateRentalRequest:
      type: object
      properties:
        customerId:
          type: integer
        dressId:
          type: integer
        rentalDate:
          type: string
          format: date
        returnDate:
          type: string
          format: date
        rentalPrice:
          type: number
        depositPaid:
          type: number
        notes:
          type: string
          nullable: true
      required: [customerId, dressId, rentalDate, returnDate, rentalPrice, depositPaid]

    UpdateRentalRequest:
      type: object
      properties:
        status:
          type: string
          enum: [rented, returned, overdue]
        actualReturnDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    Payment:
      type: object
      properties:
        id:
          type: integer
        bookingId:
          type: integer
          nullable: true
        rentalId:
          type: integer
          nullable: true
        amount:
          type: number
        paymentMethod:
          type: string
          enum: [cash, bank_transfer, momo, zalo_pay]
        paymentType:
          type: string
          enum: [deposit, final_payment, rental_fee, refund]
        notes:
          type: string
          nullable: true
        paidAt:
          type: string
          format: date-time
      required: [id, amount, paymentMethod, paymentType, paidAt]

    CreatePaymentRequest:
      type: object
      properties:
        bookingId:
          type: integer
          nullable: true
        rentalId:
          type: integer
